<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProductSection</title>
    <link rel="stylesheet" href="./library.css" />
</head>
<body class="product-embed-body">
    <section class="product-section product-section-standalone">
        <span class="mini-label">Services</span>
        <h2>Custom Mathematical Software</h2>
        <p>
            Warren Harding builds custom symbolic mathematics systems, agentic software, and technical tools where math,

        <p class="muted-note">

        <div class="product-links">

        </div>
    </section>
    <script>
        (function () {
            function resizeFrame() {
                if (!window.frameElement) {
                    return;
                }

                const root = document.documentElement;
                const body = document.body;
                const height = Math.max(
                    body ? body.scrollHeight : 0,
                    body ? body.offsetHeight : 0,
                    root ? root.scrollHeight : 0,
                    root ? root.offsetHeight : 0
                );

                window.frameElement.style.height = (height + 4) + "px";
            }

            window.addEventListener("load", resizeFrame);
            window.addEventListener("resize", resizeFrame);
            setTimeout(resizeFrame, 0);
        })();
    </script>
</body>
</html>
