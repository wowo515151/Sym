<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SymBlazor</title>
    <base href="/" />
    <link rel="stylesheet" href="/sym/css/app.css" />
    <link rel="stylesheet" href="/sym/library.css" />
    <link rel="stylesheet" href="/sym/graph.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const requestedRoute = (params.get("route") || "").replace(/^\/+|\/+$/g, "");
        const targetPath = requestedRoute.length > 0 ? "/" + requestedRoute : "/";
        if (window.location.pathname !== targetPath || window.location.search.length > 0) {
            window.history.replaceState(null, "", targetPath);
        }
    </script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="/sym/graphInterop.js"></script>
    <script src="/_framework/blazor.webassembly.js"></script>
</body>
</html>
